version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped

    ports:
      - "5000:5000"

    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/tododb

    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mongo_data: